<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Empresas de Seguridad Privada</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ECEFF1;
    font-family:'Roboto',sans-serif;
    padding:35px 18px;
}

/* ---------- LOGO ---------- */

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
}

.logo img{
    width:100%;
    max-width:980px;
    height:auto;
}

/* ---------- TARJETA ---------- */

.card{

    max-width:1180px;

    margin:auto;

    background:#fff;

    border-radius:8px;

    box-shadow:
        0 2px 6px rgba(0,0,0,.15),
        0 10px 28px rgba(0,0,0,.08);

    overflow:hidden;

}

.content{

    padding:45px 60px 70px;

}

.title{

    display:flex;

    align-items:flex-start;

    gap:16px;

    margin-bottom:60px;

}

.check{

    color:#35C4AE;

    font-size:34px;

    margin-top:2px;

}

.title h1{

    color:#666;

    font-size:24px;

    font-weight:500;

    text-transform:uppercase;

    letter-spacing:.5px;

    line-height:1.3;

}

.section{

    margin-bottom:60px;

}

.label{

    font-size:28px;

    font-weight:700;

    color:#222;

    margin-bottom:16px;

}

.value{

    color:#222;

    font-size:46px;

    font-weight:300;

    line-height:1.15;

}

.nowrap{

    white-space:nowrap;

}

/* ---------- CELULAR ---------- */

@media (max-width:900px){

.logo{

margin-bottom:22px;

}

.logo img{

max-width:100%;

}

.content{

padding:30px 22px 40px;

}

.title{

margin-bottom:38px;

}

.check{

font-size:28px;

}

.title h1{

font-size:18px;

}

.label{

font-size:20px;

}

.value{

font-size:22px;

white-space:nowrap;

}

.section{

margin-bottom:40px;

}

}

</style>

</head>

<body>

<div class="logo">
    <img src="logo-sonora.jpg" alt="Gobierno de Sonora">
</div>

<div class="card">

<div class="content">

<div class="title">

<div class="check">✔</div>

<h1>REGISTRO DE EMPRESAS DE SEGURIDAD PRIVADA</h1>

</div>

<div class="section">

<div class="label">
Empresa:
</div>

<div class="value nowrap">
Eduardo Acosta Sanchez
</div>

</div>

<div class="section">

<div class="label">
Número de autorización:
</div>

<div class="value">
LSP-R-2010-M-271
</div>

</div>

<div class="section">

<div class="label">
Fecha vigencia:
</div>

<div class="value">
31/Diciembre/2026
</div>

</div>

</div>

</div>

</body>
</html>

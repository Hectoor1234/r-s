<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Empresa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Roboto',sans-serif;
    background:#ECEFF1;
    padding:40px 20px;
}

.container{

    max-width:1150px;
    margin:auto;

    background:#fff;

    border-radius:8px;

    box-shadow:
    0 2px 6px rgba(0,0,0,.15),
    0 8px 25px rgba(0,0,0,.08);

    padding:45px 55px;
}

.title{

    display:flex;
    align-items:flex-start;

    gap:18px;

    margin-bottom:75px;

}

.check{

    color:#27C3A8;

    font-size:42px;

    line-height:1;

    margin-top:2px;

}

.title h1{

    color:#666;

    font-size:32px;

    font-weight:500;

    letter-spacing:.3px;

    text-transform:uppercase;

}

.section{

    margin-bottom:70px;

}

.label{

    color:#222;

    font-size:34px;

    font-weight:700;

    margin-bottom:18px;

}

.value{

    color:#222;

    font-size:60px;

    font-weight:300;

    line-height:1.2;

    padding-left:4px;

}

@media(max-width:900px){

.container{

padding:30px;

}

.title{

margin-bottom:45px;

}

.title h1{

font-size:24px;

}

.check{

font-size:34px;

}

.label{

font-size:24px;

}

.value{

font-size:34px;

}

.section{

margin-bottom:45px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

<div class="check">✔</div>

<h1>REGISTRO DE EMPRESAS DE SEGURIDAD PRIVADA</h1>

</div>

<div class="section">

<div class="label">
Empresa:
</div>

<div class="value">
Eduardo Acosta Sanchez
</div>

</div>

<div class="section">

<div class="label">
Número de autorización:
</div>

<div class="value">
LSP-R-2010-M-271
</div>

</div>

<div class="section">

<div class="label">
Fecha vigencia:
</div>

<div class="value">
31/Diciembre/2026
</div>

</div>

</div>

</body>

</html>
